<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mochi-Puni</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
  html,body { background:#0a0a1a;width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none; }
  #wrapper { display:flex;flex-direction:column;width:100%;height:100%; }
  #hud {
    display:flex;justify-content:space-between;align-items:center;
    width:100%;padding:6px 14px;flex-shrink:0;
    font-family:'Press Start 2P',monospace;font-size:clamp(11px,2.5vw,18px);
    background:rgba(0,0,0,0.5);
  }
  #hud .s{color:#ffe066;} #hud .c{color:#ffd700;} #hud .l{color:#ff6b9d;}
  canvas { display:block;width:100%;flex:1;min-height:0; }
  #controls {
    display:flex;justify-content:space-between;align-items:center;
    width:100%;padding:8px 20px 12px;flex-shrink:0;
    background:rgba(0,0,0,0.3);
  }
  .dpad{display:flex;gap:8px;}
  .btn {
    width:58px;height:58px;border-radius:50%;
    background:rgba(92,53,204,0.4);border:2px solid rgba(92,53,204,0.75);
    color:white;font-size:20px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 3px 12px rgba(92,53,204,0.4);
    transition:background .05s,transform .05s;flex-shrink:0;
  }
  .btn.pressed{background:rgba(92,53,204,0.9);transform:scale(0.90);}
  .btn-jump{
    width:70px;height:70px;font-size:26px;
    background:rgba(255,107,157,0.4);border-color:rgba(255,107,157,0.75);
    box-shadow:0 3px 16px rgba(255,107,157,0.4);
  }
  .btn-jump.pressed{background:rgba(255,107,157,0.9);}
  .btn-kick{
    width:58px;height:58px;font-size:22px;
    background:rgba(255,140,0,0.4);border-color:rgba(255,140,0,0.75);
    box-shadow:0 3px 12px rgba(255,140,0,0.4);
  }
  .btn-kick.pressed{background:rgba(255,140,0,0.9);transform:scale(0.90);}
  #overlay{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(5,5,20,0.88);z-index:100;font-family:'Press Start 2P',monospace;
  }
  #obox{
    background:#0d0d2e;border:2px solid #5c35cc;border-radius:16px;
    padding:28px 24px;text-align:center;color:white;
    box-shadow:0 0 60px #5c35cc55;max-width:290px;width:86%;
  }
  #obox h1{font-size:18px;color:#ffe066;text-shadow:0 0 20px #ffe066;margin-bottom:12px;line-height:1.8;}
  #obox p{font-size:8px;color:#aaa;margin-bottom:20px;line-height:2.4;}
  #obox button{
    background:#5c35cc;color:white;border:none;padding:12px 0;width:100%;
    font-family:'Press Start 2P',monospace;font-size:10px;
    border-radius:8px;cursor:pointer;box-shadow:0 5px 0 #3d1f99;
  }
  #obox button:active{transform:translateY(3px);box-shadow:0 2px 0 #3d1f99;}
  .hidden{display:none!important;}
  #menu-btn {
    position:fixed;top:44px;right:10px;z-index:300;
    width:36px;height:36px;border-radius:50%;
    background:rgba(92,53,204,0.5);border:2px solid rgba(92,53,204,0.8);
    color:white;font-size:18px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 2px 10px rgba(92,53,204,0.5);
  }
  #menu-panel {
    position:fixed;top:86px;right:10px;z-index:300;
    background:#0d0d2e;border:2px solid #5c35cc;border-radius:12px;
    padding:10px 14px;display:flex;flex-direction:column;gap:10px;
    box-shadow:0 4px 24px rgba(92,53,204,0.5);
    font-family:'Press Start 2P',monospace;font-size:8px;color:white;
    transition:opacity 0.15s,transform 0.15s;
  }
  #menu-panel.hidden{opacity:0;pointer-events:none;transform:translateY(-8px);}
  .menu-row{display:flex;align-items:center;justify-content:space-between;gap:12px;white-space:nowrap;}
  .toggle {
    width:38px;height:20px;border-radius:10px;background:#333;position:relative;
    cursor:pointer;border:1px solid #555;flex-shrink:0;transition:background 0.2s;
  }
  .toggle.on{background:#5c35cc;}
  .toggle::after{
    content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;
    border-radius:50%;background:white;transition:left 0.2s;
  }
  .toggle.on::after{left:20px;}
  .menu-reload{
    width:100%;padding:6px 0;background:#3d1f99;border:none;border-radius:6px;
    color:white;font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;
    box-shadow:0 3px 0 #2a1166;
  }
  .menu-reload:active{transform:translateY(2px);box-shadow:0 1px 0 #2a1166;}
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'Press Start 2P',monospace;font-size:24px;
    color:#ffe066;text-shadow:0 0 30px #ffe066,0 0 60px #ffe066;
    pointer-events:none;z-index:200;opacity:0;transition:opacity 0.3s;
  }
</style>
</head>
<body>
<div id="wrapper">
  <div id="hud">
    <span class="s">⭐<span id="sc">0</span></span>
    <span class="c">🪙<span id="co">0</span></span>
    <span class="l">❤️<span id="li">3</span></span>
  </div>
  <canvas id="gc"></canvas>
  <div id="controls">
    <div class="dpad">
      <div class="btn" id="bL">◀</div>
      <div class="btn" id="bR">▶</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="btn btn-kick" id="bK">🫱</div>
      <div class="btn btn-jump" id="bJ">↑</div>
    </div>
  </div>
</div>
<div id="menu-btn" onclick="toggleMenu()">⚙️</div>
<div id="menu-panel" class="hidden">
  <div class="menu-row">
    <span>BGM</span>
    <div class="toggle on" id="tog-bgm" onclick="toggleBGM(this)"></div>
  </div>
  <div class="menu-row">
    <span>SE</span>
    <div class="toggle on" id="tog-se" onclick="toggleSE(this)"></div>
  </div>
  <button class="menu-reload" onclick="resumeAudio()">🔊 音リロード</button>
</div>
<div id="stage-banner"></div>
<div id="overlay">
  <div id="obox">
    <h1>Mochi-Puni</h1>
    <p>もちぷにでゴールを目指すゆ！<br><br>
    🪙 コインを集めるゆ<br>
    🫱 触手→敵を吹っ飛ばす<br>
    💀 2面の敵は上から乗るとアウト<br>
    ⬆️ 2段ジャンプOK</p>
    <button id="startBtn">▶ START!</button>
  </div>
</div>

<script>
let menuOpen = false;
let bgmOn = true, seOn = true;

function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('menu-panel').classList.toggle('hidden', !menuOpen);
  if (typeof gState !== 'undefined') {
    if (menuOpen && gState === 'playing') {
      gState = 'paused';
    } else if (!menuOpen && gState === 'paused') {
      gState = 'playing';
      requestAnimationFrame(loop);
    }
  }
}
document.addEventListener('touchstart', e => {
  if (menuOpen && !e.target.closest('#menu-btn') && !e.target.closest('#menu-panel')) {
    menuOpen = false;
    document.getElementById('menu-panel').classList.add('hidden');
    if (typeof gState !== 'undefined' && gState === 'paused') {
      gState = 'playing';
      requestAnimationFrame(loop);
    }
  }
}, { passive: true });

function toggleBGM(el) {
  bgmOn = !bgmOn;
  el.classList.toggle('on', bgmOn);
  if (bgmOn) startBGM(); else stopBGM();
}
function toggleSE(el) {
  seOn = !seOn;
  el.classList.toggle('on', seOn);
}

async function loadScripts(){
  const files = ['bgm.js','stage.js','draw.js','game.js'];
  const v = Date.now();
  for(const f of files){
    await new Promise(r=>{
      const s=document.createElement('script');
      s.src=f+'?'+v; s.onload=r;
      document.head.appendChild(s);
    });
  }
}
loadScripts();
</script>

</body>
</html>
